<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Final</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1f1f1f;
padding:30px;
border-radius:24px;
}

textarea{
width:100%;
height:220px;
padding:15px;
border:none;
border-radius:16px;
background:#2c2c2c;
color:white;
font-size:18px;
margin-top:20px;
margin-bottom:20px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

#status{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Cloud Final</h1>

<p>Test final REST Supabase.</p>

<textarea id="cloudText"></textarea>

<button id="saveBtn">Sauvegarder</button>
<button id="loadBtn">Recharger cloud</button>

<div id="status">Connexion...</div>

</div>

<script>

const SUPABASE_URL =
'https://kijhnxehaxdjgvkddgyo.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpamhueGVoYXhkamd2a2RkZ3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNzg1MzUsImV4cCI6MjA5Mzk1NDUzNX0.NkiQ8wHtG8R79F-c5EQo8ZJ3X9wc4-qBjM2y8PlsmbI';

const status = document.getElementById('status');
const textarea = document.getElementById('cloudText');

function setStatus(text,color='white'){
status.innerHTML = text;
status.style.color = color;
}

setStatus('Cloud REST prêt','#7eff83');

async function saveCloud(){

try{

const response = await fetch(
SUPABASE_URL + '/rest/v1/cloud_saves',
{
method:'POST',
headers:{
'Content-Type':'application/json',
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY,
'Prefer':'resolution=merge-duplicates'
},
body:JSON.stringify({
id:'save1',
content:{
text:textarea.value
},
updated_at:new Date().toISOString()
})
}
);

const result = await response.text();

console.log(result);

if(response.ok){
setStatus('Sauvegarde OK','#7eff83');
}else{
setStatus('Erreur sauvegarde','#ff6666');
console.error(result);
}

}catch(e){
console.error(e);
setStatus('Erreur sauvegarde','#ff6666');
}

}

async function loadCloud(){

try{

const response = await fetch(
SUPABASE_URL +
'/rest/v1/cloud_saves?id=eq.save1&select=*',
{
method:'GET',
headers:{
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY
}
}
);

if(!response.ok){
throw new Error('HTTP ' + response.status);
}

const data = await response.json();

console.log(data);

if(data.length > 0){
textarea.value = data[0].content?.text || '';
setStatus('Chargement OK','#7eff83');
}else{
setStatus('Aucune donnée','#ffaa33');
}

}catch(e){
console.error(e);
setStatus('Erreur chargement','#ff6666');
}

}

document.getElementById('saveBtn').onclick = saveCloud;
document.getElementById('loadBtn').onclick = loadCloud;

loadCloud();

</script>

</body>
</html>
