<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Royaumes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:url('./fond.png') top center repeat-y;
background-size:100% auto;
padding:20px;
color:white;
min-height:100vh;
}

#app{
max-width:1900px;
margin:auto;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:260px;
max-width:90%;
}

.topbar{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:20px;
}

button{
background:#6f4a28;
border:none;
padding:14px 20px;
border-radius:14px;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

#cloudStatus{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:25px;
}

.city-card{
background:rgba(20,10,0,0.9);
border:2px solid #8d6239;
border-radius:24px;
padding:25px;
margin-bottom:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.city-name{
width:100%;
text-align:center;
background:#f1e3ca;
border:none;
border-radius:14px;
padding:16px;
font-size:34px;
font-weight:bold;
color:#2b170c;
margin-bottom:22px;
}

.progress-wrapper{
margin-bottom:30px;
}

.progress{
height:32px;
background:#222;
border-radius:999px;
overflow:hidden;
margin-bottom:12px;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,#2fe05f,#7eff83);
box-shadow:0 0 15px rgba(80,255,120,0.6);
transition:0.3s;
}

.progress-steps{
display:flex;
justify-content:space-between;
padding:0 8px;
font-weight:bold;
}

.levels-grid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:12px;
}

.level{
background:#6f4a28;
padding:12px;
border-radius:16px;
min-height:210px;
}

.level.completed{
outline:3px solid #35d75d;
box-shadow:0 0 18px rgba(53,215,93,0.5);
}

.level-title{
background:#f1e3ca;
color:#2b170c;
padding:10px;
border-radius:10px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
font-size:15px;
line-height:1.2;
height:48px;
display:flex;
align-items:center;
justify-content:center;
}

.task{
display:flex;
align-items:center;
gap:10px;
background:#f1e3ca;
color:#2b170c;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:13px;
}

.task input[type=text]{
flex:1;
border:none;
background:transparent;
font-size:13px;
}

.custom-check{
width:24px;
height:24px;
border-radius:8px;
border:2px solid #ccc;
background:white;
appearance:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.custom-check:checked{
background:#35d75d;
border-color:#35d75d;
}

.custom-check:checked::after{
content:'✓';
color:white;
font-weight:bold;
font-size:16px;
}

.delete-btn{
background:#b71c1c;
width:28px;
height:28px;
border-radius:50%;
padding:0;
}

.editor-grid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:12px;
}

.editor-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

</style>
</head>
<body>

<div id="app">

<div class="logo">
<img src="./logo.png">
</div>

<div class="topbar">
<button id="toggleEditBtn">Modifier</button>
<button id="addCityBtn">Ajouter ville</button>
<button id="downloadBtn">Télécharger PNG</button>
</div>

<div id="cloudStatus">Connexion...</div>

<div id="editorPanel"></div>

<div id="citiesContainer"></div>

</div>

<script>

const SUPABASE_URL =
'https://kijhnxehaxdjgvkddgyo.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpamhueGVoYXhkamd2a2RkZ3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNzg1MzUsImV4cCI6MjA5Mzk1NDUzNX0.NkiQ8wHtG8R79F-c5EQo8ZJ3X9wc4-qBjM2y8PlsmbI';

const state = {
editMode:false,

model:{
levels:[
{name:'Palier 1',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 2',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 3',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 4',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 5',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 6',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 7',tasks:['Tâche 1','Tâche 2']},
{name:'Palier 8',tasks:['Tâche 1','Tâche 2']}
]
},

cities:[]
};

function setStatus(text,color='white'){
const el=document.getElementById('cloudStatus');
el.innerHTML=text;
el.style.color=color;
}

function uid(){
return String(Date.now()+Math.random());
}

function createCity(name='Nouvelle ville'){
return {
id:uid(),
name:name,
checks:{}
};
}

function syncCities(){
state.cities.forEach(city=>{

state.model.levels.forEach((level,l)=>{

if(!city.checks[l]){
city.checks[l]={};
}

level.tasks.forEach((task,t)=>{

if(city.checks[l][t]===undefined){
city.checks[l][t]=false;
}

});

});

});
}

function calculateProgress(city){

const total=state.model.levels.length;

let completed=[];

state.model.levels.forEach((level,l)=>{

let valid=true;

level.tasks.forEach((task,t)=>{

if(!city.checks[l]?.[t]){
valid=false;
}

});

if(valid && level.tasks.length>0){
completed.push(l);
}

});

return {
percent: total ? Math.round((completed.length/total)*100) : 0,
completed
};

}

async function saveCloud(){

try{

const response = await fetch(
SUPABASE_URL + '/rest/v1/cloud_saves',
{
method:'POST',
headers:{
'Content-Type':'application/json',
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY,
'Prefer':'resolution=merge-duplicates'
},
body:JSON.stringify({
id:'save1',
content:state,
updated_at:new Date().toISOString()
})
}
);

if(response.ok){
setStatus('☁️ Sauvegarde cloud OK','#7eff83');
}else{
setStatus('❌ Erreur sauvegarde','#ff6666');
console.error(await response.text());
}

}catch(e){
console.error(e);
setStatus('❌ Erreur sauvegarde','#ff6666');
}

}

async function loadCloud(){

try{

const response = await fetch(
SUPABASE_URL +
'/rest/v1/cloud_saves?id=eq.save1&select=*',
{
method:'GET',
headers:{
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY
}
}
);

const data = await response.json();

if(data.length>0){
state.model = data[0].content.model || state.model;
state.cities = data[0].content.cities || [];
}

setStatus('☁️ Cloud connecté','#7eff83');

}catch(e){
console.error(e);
setStatus('❌ Erreur cloud','#ff6666');
}

}

function renderEditor(){

const panel=document.getElementById('editorPanel');

if(!state.editMode){
panel.innerHTML='';
return;
}

let html=`
<div class="city-card">

<div class="editor-header">
<h2>Ville modèle</h2>

<button onclick="addLevel()">
Ajouter palier
</button>
</div>

<div class="editor-grid">
`;

state.model.levels.forEach((level,l)=>{

html+=`
<div class="level">

<div class="editor-header">

<input class="level-title"
value="${level.name}"
onchange="renameLevel(${l}, this.value)">

<button class="delete-btn"
onclick="deleteLevel(${l})">
✕
</button>

</div>
`;

level.tasks.forEach((task,t)=>{

html+=`
<div class="task">

<input type="text"
value="${task}"
onchange="renameTask(${l}, ${t}, this.value)">

<button class="delete-btn"
onclick="deleteTask(${l}, ${t})">
✕
</button>

</div>
`;

});

html+=`
<button onclick="addTask(${l})">
Ajouter tâche
</button>
`;

html+=`</div>`;

});

html+=`</div></div>`;

panel.innerHTML=html;

}

function renderCities(){

const container=document.getElementById('citiesContainer');

container.innerHTML='';

state.cities.forEach(city=>{

const progress=calculateProgress(city);

let html=`
<div class="city-card">

<input class="city-name"
value="${city.name}"
onchange="renameCity('${city.id}', this.value)">

<div class="progress-wrapper">

<div class="progress">
<div class="progress-fill"
style="width:${progress.percent}%">
</div>
</div>

<div class="progress-steps">
`;

for(let i=1;i<=state.model.levels.length;i++){

html+=`<div>${i}</div>`;

}

html+=`
</div>
</div>

<div class="levels-grid">
`;

state.model.levels.forEach((level,l)=>{

const completed=progress.completed.includes(l);

html+=`
<div class="level ${completed ? 'completed':''}">

<div class="level-title">
${level.name}
</div>
`;

level.tasks.forEach((task,t)=>{

html+=`
<div class="task">

<input type="checkbox"
class="custom-check"
${city.checks[l]?.[t] ? 'checked':''}
onchange="toggleTask('${city.id}', ${l}, ${t}, this.checked)">

<div>${task}</div>

</div>
`;

});

html+=`</div>`;

});

html+=`</div></div>`;

container.innerHTML += html;

});

}

function render(){
renderEditor();
renderCities();
}

async function sync(){
syncCities();
render();
await saveCloud();
}

async function addCity(){
state.cities.push(createCity());
await sync();
}

async function renameCity(id,value){
const city=state.cities.find(c=>c.id===id);
if(city) city.name=value;
await sync();
}

async function toggleTask(id,l,t,checked){
const city=state.cities.find(c=>c.id===id);
city.checks[l][t]=checked;
await sync();
}

async function addLevel(){
state.model.levels.push({
name:'Nouveau palier',
tasks:['Nouvelle tâche']
});
await sync();
}

async function renameLevel(index,value){
state.model.levels[index].name=value;
await sync();
}

async function deleteLevel(index){
state.model.levels.splice(index,1);
await sync();
}

async function addTask(level){
state.model.levels[level].tasks.push('Nouvelle tâche');
await sync();
}

async function renameTask(level,task,value){
state.model.levels[level].tasks[task]=value;
await sync();
}

async function deleteTask(level,task){
state.model.levels[level].tasks.splice(task,1);
await sync();
}

document.getElementById('toggleEditBtn').onclick=()=>{
state.editMode=!state.editMode;
render();
};

document.getElementById('addCityBtn').onclick=addCity;

document.getElementById('downloadBtn').onclick=()=>{
window.print();
};

(async()=>{

await loadCloud();

if(state.cities.length===0){
state.cities.push(createCity('Ville 1'));
}

syncCities();

render();

})();

</script>

</body>
</html>
