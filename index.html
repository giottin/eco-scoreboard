<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Villes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:url('./fond.png') top center repeat-y;
background-size:100% auto;
color:white;
}

.logo{text-align:center;margin-bottom:20px;}
.logo img{width:240px;max-width:90%;}

.topbar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
background:#6b4325;
border:none;
padding:12px 18px;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
}

.city{
background:rgba(20,10,0,0.88);
border:2px solid #8d6239;
border-radius:18px;
padding:20px;
margin-bottom:25px;
}

.city-title{
background:#f1e3ca;
color:#2b170c;
padding:12px;
border-radius:12px;
display:flex;
gap:10px;
align-items:center;
margin-bottom:15px;
}

.city-title input{
flex:1;
border:none;
background:transparent;
font-size:22px;
font-weight:bold;
}

.progress{
height:24px;
background:#222;
border-radius:999px;
overflow:hidden;
margin-bottom:20px;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,#39c95a,#7eff84);
}

.level{
background:#6f4a28;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

.level-name{
background:#f1e3ca;
color:#2b170c;
padding:10px;
border-radius:10px;
font-weight:bold;
margin-bottom:10px;
}

.task{
display:flex;
align-items:center;
gap:10px;
background:#f1e3ca;
color:#2b170c;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.task input[type=text]{
flex:1;
border:none;
background:transparent;
}

.delete{
background:#b71c1c;
width:28px;
height:28px;
border-radius:50%;
padding:0;
}

</style>
</head>
<body>

<div id="capture">

<div class="logo">
<img src="./logo.png">
</div>

<div class="topbar">
<button onclick="toggleEdit()">Modifier</button>
<button onclick="addCity()">Ajouter ville</button>
<button onclick="downloadPNG()">Télécharger</button>
</div>

<div id="cities"></div>

</div>

<script>

const supabase = window.supabase.createClient(
'https://kijhnxehaxdjgvkddgyo.supabase.co',
'sb_publishable_mAXF0I_pLCxjnDCoIvoMYA_crqYPypL'
);

let editMode = false;

let state = {
model:{
levels:[
{
name:'Palier 1',
tasks:['Tâche 1','Tâche 2']
}
]
},
cities:[]
};

function createCity(name='Nouvelle ville'){
return{
id:Date.now()+Math.random(),
name,
checks:{}
}
}

function syncStructure(){

state.cities.forEach(city=>{

state.model.levels.forEach((level,l)=>{

if(!city.checks[l]){
city.checks[l]={};
}

level.tasks.forEach((task,t)=>{

if(city.checks[l][t]===undefined){
city.checks[l][t]=false;
}

});

});

});

}

function calculateProgress(city){

let total=0;
let done=0;

state.model.levels.forEach((level,l)=>{

level.tasks.forEach((task,t)=>{

total++;

if(city.checks[l]?.[t]){
done++;
}

});

});

return total?Math.round(done/total*100):0;

}

async function saveCloud(){

syncStructure();

await supabase
.from('dashboard_data')
.upsert({
id:1,
content:state,
updated_at:new Date().toISOString()
});

}

async function loadCloud(){

try{

const response = await supabase
.from('dashboard_data')
.select('*')
.eq('id',1)
.single();

if(response && response.data && response.data.content){
state=response.data.content;
}

}catch(e){
console.error(e);
}

syncStructure();
render();

}

function render(){

syncStructure();

const container=document.getElementById('cities');
container.innerHTML='';

if(editMode){

const model=document.createElement('div');
model.className='city';

let html='<div class="city-title"><strong>Ville Modèle</strong></div>';

state.model.levels.forEach((level,l)=>{

html+=`
<div class="level">

<div class="city-title">
<input value="${level.name}" onchange="renameLevel(${l},this.value)">
<button class="delete" onclick="deleteLevel(${l})">✕</button>
</div>
`;

level.tasks.forEach((task,t)=>{

html+=`
<div class="task">
<input type="text" value="${task}" onchange="renameTask(${l},${t},this.value)">
<button class="delete" onclick="deleteTask(${l},${t})">✕</button>
</div>
`;

});

html+=`<button onclick="addTask(${l})">Ajouter tâche</button>`;
html+='</div>';

});

html+=`<button onclick="addLevel()">Ajouter palier</button>`;

model.innerHTML=html;
container.appendChild(model);

}

state.cities.forEach(city=>{

const card=document.createElement('div');
card.className='city';

let html=`

<div class="city-title">
<input value="${city.name}" onchange="renameCity('${city.id}',this.value)">
<button class="delete" onclick="deleteCity('${city.id}')">✕</button>
</div>

<div class="progress">
<div class="progress-fill" style="width:${calculateProgress(city)}%"></div>
</div>

`;

state.model.levels.forEach((level,l)=>{

html+=`
<div class="level">

<div class="level-name">
${level.name}
</div>
`;

level.tasks.forEach((task,t)=>{

html+=`
<div class="task">
<input type="checkbox"
${city.checks[l]?.[t]?'checked':''}
onchange="toggleCheck('${city.id}',${l},${t})">

<div>${task}</div>
</div>
`;

});

html+='</div>';

});

card.innerHTML=html;
container.appendChild(card);

});

}

function toggleEdit(){
editMode=!editMode;
render();
}

async function addCity(){
state.cities.push(createCity());
await saveCloud();
render();
}

async function renameCity(id,value){

const city=state.cities.find(c=>String(c.id)===String(id));

if(city){
city.name=value;
await saveCloud();
}

}

async function deleteCity(id){
state.cities=state.cities.filter(c=>String(c.id)!==String(id));
await saveCloud();
render();
}

async function toggleCheck(id,l,t){

const city=state.cities.find(c=>String(c.id)===String(id));

city.checks[l][t]=!city.checks[l][t];

await saveCloud();
render();

}

async function addLevel(){

state.model.levels.push({
name:'Nouveau palier',
tasks:['Nouvelle tâche']
});

await saveCloud();
render();

}

async function renameLevel(i,value){
state.model.levels[i].name=value;
await saveCloud();
}

async function deleteLevel(i){
state.model.levels.splice(i,1);
await saveCloud();
render();
}

async function addTask(l){
state.model.levels[l].tasks.push('Nouvelle tâche');
await saveCloud();
render();
}

async function renameTask(l,t,value){
state.model.levels[l].tasks[t]=value;
await saveCloud();
}

async function deleteTask(l,t){
state.model.levels[l].tasks.splice(t,1);
await saveCloud();
render();
}

async function downloadPNG(){

const canvas = await html2canvas(
document.getElementById('capture'),
{
useCORS:true,
allowTaint:true,
backgroundColor:null,
scale:2
}
);

const link=document.createElement('a');
link.download='dashboard.png';
link.href=canvas.toDataURL('image/png');
link.click();

}


window.toggleEdit = toggleEdit;
window.addCity = addCity;
window.downloadPNG = downloadPNG;
window.renameCity = renameCity;
window.deleteCity = deleteCity;
window.toggleCheck = toggleCheck;
window.addLevel = addLevel;
window.renameLevel = renameLevel;
window.deleteLevel = deleteLevel;
window.addTask = addTask;
window.renameTask = renameTask;
window.deleteTask = deleteTask;

loadCloud();

</script>

</body>
</html>
