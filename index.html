<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST Cloud V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1f1f1f;
padding:30px;
border-radius:24px;
}

textarea{
width:100%;
height:220px;
padding:15px;
border:none;
border-radius:16px;
background:#2c2c2c;
color:white;
font-size:18px;
margin-top:20px;
margin-bottom:20px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

#status{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>REST Cloud V2</h1>

<p>Version REST stable sans SDK Supabase.</p>

<textarea id="cloudText"></textarea>

<button id="saveBtn">Sauvegarder</button>
<button id="loadBtn">Recharger cloud</button>

<div id="status">Connexion...</div>

</div>

<script>

const SUPABASE_URL =
'https://kijhnxehaxdjgvkddgyo.supabase.co';

const SUPABASE_ANON_KEY =
'sb_publishable_mAXF0I_pLCxjnDCoIvoMYA_crqYPypL';

const status = document.getElementById('status');
const textarea = document.getElementById('cloudText');

function setStatus(text,color='white'){

status.innerHTML = text;
status.style.color = color;

}

setStatus('Cloud REST prêt','#7eff83');

async function saveCloud(){

try{

const text = textarea.value;

const response = await fetch(
SUPABASE_URL + '/rest/v1/dashboard_data',
{
method:'POST',
headers:{
'Content-Type':'application/json',
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY,
'Prefer':'resolution=merge-duplicates'
},
body:JSON.stringify({
id:1,
content:{
text:text
}
})
}
);

console.log('SAVE STATUS', response.status);

const result = await response.text();

console.log(result);

if(response.ok){

setStatus('Sauvegarde OK','#7eff83');

}else{

setStatus('Erreur sauvegarde','#ff6666');

}

}catch(e){

console.error(e);

setStatus('Erreur sauvegarde','#ff6666');

}

}

async function loadCloud(){

try{

const response = await fetch(
SUPABASE_URL +
'/rest/v1/dashboard_data?id=eq.1&select=*',
{
method:'GET',
headers:{
'apikey':SUPABASE_ANON_KEY,
'Authorization':'Bearer ' + SUPABASE_ANON_KEY
}
}
);

console.log('LOAD STATUS', response.status);

if(!response.ok){

throw new Error('HTTP ' + response.status);

}

const data = await response.json();

console.log(data);

if(data.length > 0){

textarea.value = data[0].content?.text || '';

setStatus('Chargement OK','#7eff83');

}else{

setStatus('Aucune donnée','#ffaa33');

}

}catch(e){

console.error(e);

setStatus('Erreur chargement','#ff6666');

}

}

document.getElementById('saveBtn').onclick = saveCloud;
document.getElementById('loadBtn').onclick = loadCloud;

loadCloud();

</script>

</body>
</html>
