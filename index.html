<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
margin:0;font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.45)),
url('./fond.png');
background-size:100% auto;
background-repeat:repeat-y;
background-position:top center;
}

.overlay{padding:20px;color:white}

/* ✅ LOGO */
.logo{
display:flex;
justify-content:center;
margin-top:20px;
margin-bottom:10px;
}
.logo img{
width:320px;
}

/* UI EXISTANT INTACT */
.topbar{position:fixed;top:10px;right:10px;z-index:10}
button{margin:4px;padding:8px 14px;border:none;border-radius:10px;background:#4e6a2c;color:white}

.panel{background:rgba(107,68,35,0.92);margin:70px 0;padding:25px;border-radius:14px;position:relative}

.city-wrapper{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:10px;
}

.city-title{
background:#8b5a2b;
padding:10px 30px;
border-radius:30px;
font-size:26px;
}

.delete-btn{color:red;font-weight:bold;cursor:pointer}

.progress{display:grid;height:22px;margin-bottom:15px}
.seg{background:#2b2b2b;margin:2px;border-radius:6px;overflow:hidden}
.fill{background:#5cd65c;height:100%}

.grid{display:grid;gap:12px}
.card{background:#eee0c2;color:black;padding:10px;border-radius:8px}

.level-name{
background:#f3e6c8;
padding:6px;
border-radius:6px;
margin-bottom:8px;
text-align:center;
font-weight:bold;
}

.task{display:flex;align-items:center;justify-content:space-between}
.task-left{display:flex;align-items:center;cursor:pointer}

.box{
width:18px;height:18px;border:2px solid #aaa;margin-right:6px;
background:white;border-radius:6px;display:flex;align-items:center;justify-content:center
}

.checked .box{background:#5cd65c}
.checked .box::after{content:"✓";color:white;font-weight:bold}

.editable{outline:1px dashed #999}
</style>
</head>

<body>
<div class="overlay">

<div class="logo">
<img src="/logo.png">
</div>

<div class="topbar">
<button onclick="toggleEdit()">Modifier</button>
<button onclick="downloadPNG()">Télécharger</button>
</div>

<div id="template"></div>
<div id="cities"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js">
function downloadPNG(){
    if(!confirm("Télécharger le dashboard en PNG ?")) return;

    const target = document.getElementById("capture") || document.body;

    html2canvas(target, {
        scale: 2,
        useCORS: true
    }).then(function(canvas){
        const link = document.createElement("a");
        link.download = "dashboard.png";
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }).catch(function(e){
        alert("Erreur téléchargement: " + e);
        console.error(e);
    });
}

</script>

<script>
let edit=false;

let template = JSON.parse(localStorage.getItem("template")) || {levels:[],cols:[]};
let data = JSON.parse(localStorage.getItem("data")) || [];

function save(){
localStorage.setItem("template",JSON.stringify(template));
localStorage.setItem("data",JSON.stringify(data));
}

function sync(){
data.forEach(city=>{
while(city.cols.length<template.levels.length) city.cols.push([]);
while(city.cols.length>template.levels.length) city.cols.pop();

template.cols.forEach((col,i)=>{
city.cols[i]=col.map((t,idx)=> city.cols[i][idx] || {t:t.t,c:false});
});
});
}

function toggleEdit(){edit=!edit;render();}

function toggle(ci,i,ti,e){
e.stopPropagation();
data[ci].cols[i][ti].c=!data[ci].cols[i][ti].c;
save();render();
}

function calc(city){
return template.levels.map((l,i)=>{
let col=city.cols[i]||[];
return col.length?col.filter(x=>x.c).length/col.length:0;
});
}

function download(){
html2canvas(document.body).then(c=>{
let a=document.createElement("a");
a.href=c.toDataURL();
a.download="dashboard.png";
a.click();
});
}


function syncCitiesWithTemplate(){
    if(typeof template === "undefined" || typeof data === "undefined") return;

    data.forEach(city => {

        if(!city.cols) city.cols = [];

        while(city.cols.length < template.cols.length){
            city.cols.push([]);
        }

        while(city.cols.length > template.cols.length){
            city.cols.pop();
        }

        template.cols.forEach((col,i)=>{

            while(city.cols[i].length < col.length){
                city.cols[i].push({
                    t: col[city.cols[i].length].t,
                    c:false
                });
            }

            while(city.cols[i].length > col.length){
                city.cols[i].pop();
            }

            city.cols[i].forEach((task,ti)=>{
                task.t = col[ti].t;
            });

        });

    });
}


function render(){
    syncCitiesWithTemplate();
sync();

let t="";
if(edit){
t+=`
<div class="panel">
<div class="city-wrapper"><div class="city-title">Ville modèle</div></div>

<button onclick="addLevel()">+ Palier</button>

<div class="grid" style="grid-template-columns:repeat(${template.levels.length},1fr)">
${template.levels.map((name,i)=>`
<div class="card">

<div class="level-name editable" contenteditable="true"
oninput="template.levels[${i}]=this.innerText;save()">
${name}
</div>

${template.cols[i].map((t,ti)=>`
<div class="task">
<div contenteditable="true" class="editable"
oninput="template.cols[${i}][${ti}].t=this.innerText;save()">
${t.t}
</div>
<span class="delete-btn" onclick="deleteTask(${i},${ti})">✖</span>
</div>`).join("")}

<button onclick="addTask(${i})">+ tâche</button>

<span class="delete-btn" onclick="deleteLevel(${i})">Supprimer palier</span>

</div>`).join("")}
</div>
</div>`;
}
document.getElementById("template").innerHTML=t;

let h="";
data.forEach((city,ci)=>{
let seg=calc(city);

h+=`
<div class="panel">

<div class="city-wrapper">
<div class="city-title ${edit?'editable':''}"
${edit?'contenteditable="true" oninput="data['+ci+'].name=this.innerText;save()"' : ''}>
${city.name}
</div>
${edit?`<span class="delete-btn" onclick="deleteCity(${ci})">✖</span>`:""}
</div>

<div class="progress" style="grid-template-columns:repeat(${template.levels.length},1fr)">
${seg.map(v=>`<div class="seg"><div class="fill" style="width:${v*100}%"></div></div>`).join("")}
</div>

<div class="grid" style="grid-template-columns:repeat(${template.levels.length},1fr)">
${template.levels.map((name,i)=>`
<div class="card">

<div class="level-name">${name}</div>

${city.cols[i].map((t,ti)=>`
<div class="task">
<div class="task-left ${t.c?'checked':''}" onclick="toggle(${ci},${i},${ti},event)">
<div class="box"></div>${t.t}
</div>
</div>`).join("")}

</div>`).join("")}
</div>
</div>`;
});

if(edit) h+=`<button onclick="addCity()">+ Ville</button>`;

document.getElementById("cities").innerHTML=h;
}

function addLevel(){
template.levels.push("Palier");
template.cols.push([]);
save();render();
}

function deleteLevel(i){
template.levels.splice(i,1);
template.cols.splice(i,1);
save();render();
}

function addTask(i){
template.cols[i].push({t:"Nouvelle tâche"});
save();render();
}

function deleteTask(i,ti){
template.cols[i].splice(ti,1);
save();render();
}

function addCity(){
let cols=template.cols.map(c=>c.map(t=>({t:t.t,c:false})));
data.push({name:"Nouvelle ville",cols});
save();render();
}

function deleteCity(ci){
data.splice(ci,1);
save();render();
}

render();

function downloadPNG(){
    if(!confirm("Télécharger le dashboard en PNG ?")) return;

    const target = document.getElementById("capture") || document.body;

    html2canvas(target, {
        scale: 2,
        useCORS: true
    }).then(function(canvas){
        const link = document.createElement("a");
        link.download = "dashboard.png";
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }).catch(function(e){
        alert("Erreur téléchargement: " + e);
        console.error(e);
    });
}

</script>





<script>
window.addEventListener("load", async ()=>{

    if(typeof data !== "undefined"){

        const cloudData = await window.cloudLoad();

        if(cloudData){
            data = cloudData;
            if(typeof render === "function") render();
        }

        const oldSave = window.save;

        window.save = function(){
            if(oldSave) oldSave();
            window.cloudSave(data);
        }

        window.cloudListen((newData)=>{
            if(JSON.stringify(newData)!==JSON.stringify(data)){
                data = newData;
                if(typeof render === "function") render();
            }
        });

    }
});
</script>


<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://kijhnxehaxdjgvkddgyo.supabase.co';
const supabaseKey = 'sb_publishable_mAXF0I_pLCxjnDCoIvoMYA_crqYPypL';

const supabase = createClient(supabaseUrl, supabaseKey);

window.supabaseSyncReady = false;

async function initSupabase(){

    // créer table auto si besoin logique côté app
    try{

        // charger données cloud
        const { data: rows } = await supabase
            .from('dashboard_data')
            .select('*')
            .eq('id',1)
            .single();

        if(rows && rows.content){
            window.data = rows.content;
            if(typeof render === "function") render();
        }

        // patch save()
        const oldSave = window.save;

        window.save = async function(){
            if(oldSave) oldSave();

            try{
                await supabase
                    .from('dashboard_data')
                    .upsert({
                        id:1,
                        content:window.data,
                        updated_at:new Date().toISOString()
                    });

            }catch(e){
                console.error(e);
            }
        }

        // realtime sync
        supabase
          .channel('dashboard-sync')
          .on(
            'postgres_changes',
            {
              event:'*',
              schema:'public',
              table:'dashboard_data'
            },
            async ()=>{
                const { data: fresh } = await supabase
                    .from('dashboard_data')
                    .select('*')
                    .eq('id',1)
                    .single();

                if(fresh && fresh.content){
                    if(JSON.stringify(fresh.content)!==JSON.stringify(window.data)){
                        window.data = fresh.content;
                        if(typeof render === "function") render();
                    }
                }
            }
          )
          .subscribe();

        window.supabaseSyncReady = true;

        console.log("☁️ Supabase sync OK");

    }catch(e){
        console.error(e);
    }
}

window.addEventListener("load", initSupabase);
</script>


<script>
window.supabaseClient = window.supabase.createClient(

);
</script>

</body>
</html>
